services:
    api:
        image: img-vehicle-api-ktor-v2:latest
        build:
            context: ..
            dockerfile: Dockerfile
        container_name: api-vehicle-ktor-v2
        ports:
            - "8081:8081"
        depends_on:
            db:
                condition: service_healthy
        environment:
            DATABASE_URL: "jdbc:mariadb://db:3306/dbVehicle"
            DATABASE_USER: "usuario"
            DATABASE_PASSWORD: "usuario"
            KTOR_ENV: "dev"
            JAVA_OPTS: "-Xmx512m"
        networks:
            - ktor-network
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 512M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    db:
        image: mariadb:10.11
        container_name: ktor-mariadb
        restart: unless-stopped
        ports:
            - "3307:3306"
        command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        environment:
            MYSQL_DATABASE: dbVehicle
            MYSQL_USER: usuario
            MYSQL_PASSWORD: usuario
            MYSQL_ROOT_PASSWORD: usuario
        volumes:
            - ./dump:/docker-entrypoint-initdb.d
            - ./conf:/etc/mysql/conf.d
            - persistent:/var/lib/mysql
        networks:
            - ktor-network
        deploy:
            resources:
                limits:
                    memory: 512M
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        healthcheck:
            test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
            interval: 10s
            retries: 5
            start_period: 30s
            timeout: 10s

    phpmyadmin:
        image: phpmyadmin:5
        container_name: ktor-phpmyadmin
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        ports:
            - "8000:80"
        environment:
            PMA_HOST: db
            MYSQL_ROOT_PASSWORD: usuario
            UPLOAD_LIMIT: 64M
        networks:
            - ktor-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

networks:
    ktor-network:
        driver: bridge

volumes:
    persistent:
